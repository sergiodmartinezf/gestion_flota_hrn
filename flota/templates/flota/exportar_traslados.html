{% extends 'base.html' %}
{% block content %}
<div class="container-fluid">
    <h2 class="mb-4"><i class="bi bi-download"></i> Exportar traslados consolidados</h2>
    <p class="text-muted">Seleccione filtros opcionales y pulse "Descargar Excel" para obtener el archivo.</p>
    <div class="card">
        <div class="card-body">
            <form method="get" action="{% url 'exportar_viajes' %}" class="row g-3">
                <div class="col-md-3">
                    <label for="desde" class="form-label">Desde (fecha)</label>
                    <input type="date" name="desde" id="desde" class="form-control">
                </div>
                <div class="col-md-3">
                    <label for="hasta" class="form-label">Hasta (fecha)</label>
                    <input type="date" name="hasta" id="hasta" class="form-control">
                </div>
                <div class="col-md-3">
                    <label for="vehiculo" class="form-label">Vehículo</label>
                    <select name="vehiculo" id="vehiculo" class="form-select">
                        <option value="">Todos</option>
                        {% for v in vehiculos %}
                        <option value="{{ v.patente }}">{{ v.patente }} - {{ v.marca }} {{ v.modelo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label for="conductor" class="form-label">Conductor</label>
                    <select name="conductor" id="conductor" class="form-select">
                        <option value="">Todos</option>
                        {% for c in conductores %}
                        <option value="{{ c.rut }}">{{ c.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-file-earmark-excel"></i> Descargar Excel
                    </button>
                    <a href="{% url 'listar_bitacoras' %}" class="btn btn-secondary">Volver a bitácoras</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
